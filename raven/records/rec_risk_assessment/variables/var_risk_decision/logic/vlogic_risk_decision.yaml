api_version: raven.resource/v1
kind: variable_logic
id: vlogic_risk_decision
name: risk_decision_logic
display_name: Risk Decision Logic
state: ready
record_id: rec_risk_assessment
variable_id: var_risk_decision
execution_role: compute_output_variable
document:
  format: raven_text_logic_v1
  source: |
    SET RiskAssessment.risk_decision = CASE
      WHEN RiskAssessment.risk_score >= 85 THEN "decline"
      WHEN RiskAssessment.risk_score >= 60 THEN "review"
      ELSE "approve"
    END
module_attachment:
  status: attached
  module_id: mod_score_credit_card_risk
  module_output_id: mout_risk_assessment
  output_record_id: rec_risk_assessment
  output_value_source: computed
  logic_requirement: required
