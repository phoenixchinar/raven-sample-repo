api_version: raven.resource/v1
kind: variable_logic
id: vlogic_risk_score
name: risk_score_logic
display_name: Risk Score Logic
state: ready
record_id: rec_risk_assessment
variable_id: var_risk_score
execution_role: compute_output_variable
document:
  format: raven_text_logic_v1
  source: |
    SET RiskAssessment.risk_score =
      35 WHEN Transaction.transaction_amount > Profile.average_ticket_amount * 4
      + 25 WHEN Transaction.transaction_velocity_1h >= 5
      + 20 WHEN Transaction.card_present = false AND Transaction.device_trust_score < 0.50
      + 15 WHEN Profile.recent_chargeback_count > 0
      + 10 WHEN Transaction.merchant_country != "US"
module_attachment:
  status: attached
  module_id: mod_score_credit_card_risk
  module_output_id: mout_risk_assessment
  output_record_id: rec_risk_assessment
  output_value_source: computed
  logic_requirement: required
