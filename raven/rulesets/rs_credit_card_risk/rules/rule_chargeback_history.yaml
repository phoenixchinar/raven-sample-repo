api_version: raven.resource/v1
kind: rule
id: rule_chargeback_history
name: chargeback_history
display_name: Chargeback History
state: ready
ruleset_id: rs_credit_card_risk
input_variable_ids:
  - var_recent_chargeback_count
output_variable_ids:
  - var_risk_score
document:
  format: raven_rule_logic_v1
  source: |
    WHEN Profile.recent_chargeback_count > 0
    THEN ADD_RISK_POINTS 15 TO var_risk_score REASON chargeback_history
description: Adds risk when recent chargebacks exist on the cardholder profile.
