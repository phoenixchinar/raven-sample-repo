api_version: raven.resource/v1
kind: rule
id: rule_amount_outlier
name: amount_outlier
display_name: Amount Outlier
state: ready
ruleset_id: rs_credit_card_risk
input_variable_ids:
  - var_transaction_amount
  - var_average_ticket_amount
output_variable_ids:
  - var_risk_score
  - var_risk_reason_code
document:
  format: raven_rule_logic_v1
  source: |
    WHEN Transaction.transaction_amount > Profile.average_ticket_amount * 4
    THEN SET RiskAssessment.risk_score = RiskAssessment.risk_score + 35
      SET RiskAssessment.risk_reason_code = "amount_outlier"
description: Adds risk when the amount is several times above the cardholder average.
