api_version: raven.resource/v1
kind: rule
id: rule_low_device_trust
name: low_device_trust
display_name: Low Device Trust
state: ready
ruleset_id: rs_credit_card_risk
input_variable_ids:
  - var_card_present
  - var_device_trust_score
output_variable_ids:
  - var_risk_score
  - var_risk_reason_code
document:
  format: raven_rule_logic_v1
  source: |
    WHEN Transaction.card_present = false AND Transaction.device_trust_score < 0.50
    THEN SET RiskAssessment.risk_score = RiskAssessment.risk_score + 20
      SET RiskAssessment.risk_reason_code = "low_device_trust"
description: Adds risk for card-not-present transactions from low-trust devices.
