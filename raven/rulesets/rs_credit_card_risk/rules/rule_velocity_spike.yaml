api_version: raven.resource/v1
kind: rule
id: rule_velocity_spike
name: velocity_spike
display_name: Velocity Spike
state: ready
ruleset_id: rs_credit_card_risk
input_variable_ids:
  - var_transaction_velocity_1h
output_variable_ids:
  - var_risk_score
document:
  format: raven_rule_logic_v1
  source: |
    WHEN Transaction.transaction_velocity_1h >= 5
    THEN ADD_RISK_POINTS 25 TO var_risk_score REASON velocity_spike
description: Adds risk when the account has repeated authorization attempts in the last hour.
