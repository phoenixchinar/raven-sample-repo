api_version: raven.resource/v1
kind: rule
id: rule_cross_border
name: cross_border
display_name: Cross Border Merchant
state: ready
ruleset_id: rs_credit_card_risk
input_variable_ids:
  - var_merchant_country
output_variable_ids:
  - var_risk_score
  - var_risk_reason_code
document:
  format: raven_rule_logic_v1
  source: |
    WHEN Transaction.merchant_country != "US"
    THEN SET RiskAssessment.risk_score = RiskAssessment.risk_score + 10
      SET RiskAssessment.risk_reason_code = "cross_border"
description: Adds risk when the merchant country differs from the domestic profile.
